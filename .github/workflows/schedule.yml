name: Auto Lunch Booking

on:
  schedule:
    - cron: "30 4 * * 0-4"
  workflow_dispatch:

jobs:
  run-booking:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 🔽 Clone repo WITHOUT actions/checkout
      - name: Clone repository
        run: |
          git clone https://github.com/${{ github.repository }} .
      
      # 🔽 Install Python manually (already available, just verify)
      - name: Check Python
        run: python3 --version

      # 🔽 Install dependencies
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install requests beautifulsoup4

      # 🔽 Run script
      - name: Run booking script
        env:
          EMP_ID: ${{ secrets.EMP_ID }}
          LOCATION_TIC: ${{ secrets.LOCATION_TIC }}
        run: python3 auto_lunch_booker.py
