name: Auto Lunch Booking

on:
  schedule:
    # Run at 10:30 AM Bangladesh time (UTC+6)
    - cron: "30 4 * * 0-4"  # 04:30 UTC = 10:30 AM Bangladesh, Sunday–Thursday
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 🔥 future-proof

jobs:
  run-booking:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # update to v5 when available

      - name: Setup Python
        uses: actions/setup-python@v5   # update to v6 when available
        with:
          python-version: '3.11'   # 🔧 better than 3.x (deterministic)

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run booking script
        env:
          EMP_ID: ${{ secrets.EMP_ID }}
          LOCATION_TIC: ${{ secrets.LOCATION_TIC }}
        run: python auto_lunch_booker.py
